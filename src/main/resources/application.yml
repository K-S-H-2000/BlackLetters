spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/receipt_app?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: "blackletters1234"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: "dummy-client-id" # TODO: 카카오 REST API 키 입력
            client-secret: "dummy-client-secret" # TODO: 카카오 Client Secret 입력 (선택)
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
    region:
      static: ap-northeast-2
    s3:
      bucket: ${AWS_S3_BUCKET:}

jwt:
  secret: "BlackLettersSpringBootSecretKeyForLocalDevelopmentMakeItLongEnough1234567890" # JWT 서명용 비밀키 (256비트 이상 문자열)
  expiration: 86400000 # 24시간

gemini:
  api-key: ${GEMINI_API_KEY:}
  url: "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent"

